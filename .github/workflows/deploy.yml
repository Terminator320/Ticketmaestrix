name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH to cPanel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          passphrase:
          port: ${{ secrets.CPANEL_SSH_PORT }}
          script: |
            cd ~/repositories/Ticketmaestrix 
            git pull origin main
            /usr/local/cpanel/bin/uapi \
              --user=$USER \
              VersionControl update \
              repository_root=$HOME/repositories/Ticketmaestrix

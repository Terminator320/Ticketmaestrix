name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger cPanel Git Deploy via HTTPS API
        run: |
          RESPONSE=$(curl -sk \
            -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControl/update" \
            --data-urlencode "repository_root=/home/${{ secrets.CPANEL_USER }}/repositories/Ticketmaestrix")
          echo "$RESPONSE" | python3 -m json.tool
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if not data.get('status', 0):
              print('Deploy failed:', data.get('errors', data.get('messages', 'unknown error')))
              sys.exit(1)
          print('Deploy succeeded.')
          "
